server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com; # Thay bằng tên miền thực tế

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com; # Thay bằng tên miền thực tế

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem; # Thay yourdomain.com
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem; # Thay yourdomain.com

    # Tùy chọn bảo mật SSL (Tùy chọn)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://backend:5000;
    }
}
