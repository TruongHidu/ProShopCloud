server {
    listen 80;
    server_name kiottaypos.site www.kiottaypos.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kiottaypos.site www.kiottaypos.site;

    ssl_certificate /etc/letsencrypt/live/kiottaypos.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kiottaypos.site/privkey.pem;

    # Tùy chọn bảo mật SSL (Từ Let's Encrypt)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://backend:5000;
    }
}
