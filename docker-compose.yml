version: '3.8'

services:
  database:
    image: mongo:6-jammy
    container_name: proshop_mongo
    restart: always
    volumes:
      - proshop_db_data:/data/db
    networks:
      - proshop_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: proshop_backend
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/proshop
      - JWT_SECRET=${JWT_SECRET:-mysecretkey12345}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-sb}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - database
    networks:
      - proshop_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: proshop_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - proshop_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  proshop_db_data:

networks:
  proshop_network:
    driver: bridge
